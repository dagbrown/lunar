name: Release Tools

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test Go tools
        run: |
          for modfile in tools/*/go.mod; do
            dir=$(dirname "$modfile")
            echo "Testing $(basename "$dir")"
            cd "$dir"
            go test ./...
            cd "$GITHUB_WORKSPACE"
          done

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, 386]
        include:
          - goarch: amd64
            arch_name: amd64
          - goarch: 386
            arch_name: i686
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Discover and build Go tools
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          for modfile in tools/*/go.mod; do
            dir=$(dirname "$modfile")
            tool=$(basename "$dir")
            echo "Building $tool for linux/${{ matrix.goarch }}"
            cd "$dir"
            archive_dir="${tool}-${tag}-linux-${{ matrix.arch_name }}"
            binary="${tool}-linux-${{ matrix.arch_name }}"
            GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o "$binary" .
            mkdir -p "$archive_dir"
            mv "$binary" "$archive_dir/"
            tar cJf "${archive_dir}.tar.xz" "$archive_dir"
            cd "$GITHUB_WORKSPACE"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: tools-linux-${{ matrix.arch_name }}
          path: tools/*/*.tar.xz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          find artifacts -name '*.tar.xz' -exec mv {} artifacts/ \;
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/*.tar.xz
